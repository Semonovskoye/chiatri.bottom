<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fixed Copy Button</title>
  <style>
    .code-box {
      position: relative;
      background: #1e1e1e;
      border-radius: 8px;
      padding: 12px;
      margin: 16px 0;
      color: white;
    }

    .code-box pre {
      margin: 0;
      overflow-x: auto;
      overflow-y: hidden;
      white-space: pre;
      padding-top: 36px;
    }

    .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 10;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 6px 10px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .copy-btn:hover {
      background: #45a049;
    }

    .copy-btn:active {
      background: #2e7031;
      transform: scale(0.96);
    }
  </style>
</head>
<body>

  <div class="code-box">
    <button class="copy-btn" onclick="copyCode(this)">Copy</button>
    <pre><code>const reallyLongLine = "this is a very very very very very very very very very very long line that should scroll horizontally without moving the button";</code></pre>
  </div>

  <div class="code-box">
    <button class="copy-btn" onclick="copyCode(this)">Copy</button>
    <pre><code>function helloWorld() {
  console.log("Hello world");
}</code></pre>
  </div>

  <script>
    function copyCode(button) {
      const code = button.parentElement.querySelector("code").innerText;
      navigator.clipboard.writeText(code).then(() => {
        const oldText = button.innerText;
        button.innerText = "Copied!";
        setTimeout(() => {
          button.innerText = oldText;
        }, 1500);
      });
    }
  </script>

</body>
</html>
